name: Occupancy Refresh (Yelp + OSM, free)

on:
  schedule:
    # Runs on the 1st of each month at 6am UTC
    - cron: '0 6 1 * *'
  # To change frequency, update the cron above:
  #   - cron: '0 6 * * 0'   # weekly on Sunday
  #   - cron: '0 6 * * *'   # daily
  workflow_dispatch:
    inputs:
      batch_limit:
        description: 'Max spaces to check (default 490, Yelp free tier cap)'
        type: number
        default: 490
      use_google:
        description: 'Use Google Places API (costs $0.032/call — leave off unless needed)'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run — show what would change without writing to DB'
        type: boolean
        default: false

jobs:
  refresh:
    name: Cross-reference vacant listings
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Push schema changes (add yelp_checked_at if needed)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma db push --accept-data-loss

      - name: Run occupancy enrichment
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_MAPS_API_KEY: ${{ inputs.use_google && secrets.GOOGLE_MAPS_API_KEY || '' }}
          YELP_API_KEY: ${{ secrets.YELP_API_KEY }}
          YELP_ENABLE: '1'
          BATCH_LIMIT: ${{ inputs.batch_limit || 490 }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: npx tsx scripts/enrich-occupancy-places.ts
