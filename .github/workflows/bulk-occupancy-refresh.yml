name: Bulk Occupancy Refresh (Free Public Data)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show what would change without writing to DB'
        type: boolean
        default: false

jobs:
  refresh:
    name: Cross-reference against public datasets
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Python (for Overture Maps CLI)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Push schema (ensure yelp_checked_at column exists)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma db push --accept-data-loss

      - name: Download Overture Maps places for Portland
        run: |
          pip install overturemaps -q
          echo "Downloading Portland places from Overture Maps (Microsoft/Meta/Amazon/TomTom)..."
          overturemaps download \
            --bbox="-122.84,45.43,-122.47,45.65" \
            -f geojson \
            --type=place \
            -o /tmp/portland_places.geojson
          echo "Downloaded $(wc -l < /tmp/portland_places.geojson) lines"
          # Show a sample record
          head -c 500 /tmp/portland_places.geojson

      - name: Run bulk enrichment
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OVERTURE_FILE: /tmp/portland_places.geojson
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: npx tsx scripts/enrich-occupancy-bulk.ts
